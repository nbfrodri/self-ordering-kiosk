services:

  # ---------------------------------------------------------------------------
  # PHP-FPM application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: kiosk_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: kiosk_db
      DB_USERNAME: kiosk_user
      DB_PASSWORD: kiosk_password
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DATABASE: kiosk_analytics
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_started
    networks:
      - kiosk_network

  # ---------------------------------------------------------------------------
  # Nginx web server
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: kiosk_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - kiosk_network

  # ---------------------------------------------------------------------------
  # MySQL 8
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: kiosk_mysql
    restart: unless-stopped
    ports:
      - "33060:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: kiosk_db
      MYSQL_USER: kiosk_user
      MYSQL_PASSWORD: kiosk_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - kiosk_network

  # ---------------------------------------------------------------------------
  # MongoDB 7
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7
    container_name: kiosk_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: kiosk_analytics
    volumes:
      - mongodb_data:/data/db
    networks:
      - kiosk_network

# -----------------------------------------------------------------------------
# Named volumes
# -----------------------------------------------------------------------------
volumes:
  mysql_data:
    driver: local
  mongodb_data:
    driver: local

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  kiosk_network:
    driver: bridge
